name: deploy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Role name is set by aws-foundation's deploy-role module and follows the
      # "<repo>-deploy" convention, so the ARN is derivable — no repo variables to set.
      # Rename the role there and this string must follow.
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::224193574799:role/aws-api-gateway-deploy
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - run: terraform init
      - run: terraform plan

      - run: terraform apply -auto-approve
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
