name: deploy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ponytail: temporary — prints the OIDC token's claims so we can see the real
      # sub/aud instead of guessing. Delete once the assume-role failure is solved.
      - name: debug OIDC claims
        run: |
          curl -sH "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" \
            | cut -d. -f2 | base64 -d 2>/dev/null | tr ',' '\n' \
            | grep -E '"(sub|aud|iss|repository|repository_owner)"'

      # Role name is set by aws-foundation's deploy-role module and follows the
      # "<repo>-deploy" convention, so the ARN is derivable — no repo variables to set.
      # Rename the role there and this string must follow.
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::224193574799:role/aws-api-gateway-deploy
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - run: terraform init
      - run: terraform plan

      - run: terraform apply -auto-approve
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
